theme:
  name: material
  use_directory_urls: false
  palette:
    - scheme: default
      primary: brown
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - content.footnote.tooltips
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search

markdown_extensions:
  - footnotes
  - abbr
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  meta:
    - name: robots
      content: noindex, nofollow
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
copyright: >
  &copy; 2026 Brice Project. All rights